{{- if not .Values.grafana.sso.secretArn }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana
  namespace: {{ .Release.Namespace }}
data:
  grafana.ini: |
    [server]
    root_url = %(protocol)s://%(domain)s:%(http_port)s/

    [security]
    disable_gravatar = true

    [database]
    type = sqlite3
    path = /var/lib/grafana/grafana.db
    wal = true

    [auth]
    disable_login_form = true

    [auth.anonymous]
    enabled = true
    org_role = Admin

    [auth.basic]
    enabled = false

    [users]
    allow_sign_up = false
    auto_assign_org_role = Admin

    [analytics]
    reporting_enabled = false
    check_for_updates = false
    check_for_plugin_updates = false

    [log]
    mode = console
    level = info
{{- end }}
