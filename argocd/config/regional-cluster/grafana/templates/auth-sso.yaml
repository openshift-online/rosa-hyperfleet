{{- if .Values.grafana.sso.secretArn }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana
  namespace: {{ .Release.Namespace }}
data:
  grafana.ini: |
    [server]
    root_url = https://%(domain)s/

    [security]
    disable_gravatar = true

    [database]
    type = sqlite3
    path = /var/lib/grafana/grafana.db
    wal = true

    [auth]
    disable_login_form = false

    [auth.anonymous]
    enabled = false

    [auth.basic]
    enabled = false

    [auth.generic_oauth]
    enabled = true
    name = Red Hat SSO
    allow_sign_up = true
    client_id = $__env{SSO_CLIENT_ID}
    client_secret = $__env{SSO_CLIENT_SECRET}
    scopes = openid email profile offline_access
    email_attribute_path = email
    login_attribute_path = preferred_username
    name_attribute_path = name
    auth_url = $__env{SSO_AUTH_URL}
    token_url = $__env{SSO_TOKEN_URL}
    api_url = $__env{SSO_API_URL}
    skip_org_role_sync = true
    auto_login = true

    [users]
    allow_sign_up = false
    auto_assign_org_role = Admin

    [analytics]
    reporting_enabled = false
    check_for_updates = false
    check_for_plugin_updates = false

    [log]
    mode = console
    level = info
{{- end }}
