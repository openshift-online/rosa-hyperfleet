{{- if index .Values "oauth2-proxy" "enabled" }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-oauth-proxy
  namespace: grafana
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: grafana-oauth-proxy
    creationPolicy: Owner
  data:
    - secretKey: client-id
      remoteRef:
        key: {{ .Values.global.cluster_name }}-grafana-oauth-proxy
        property: client-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: client-secret
      remoteRef:
        key: {{ .Values.global.cluster_name }}-grafana-oauth-proxy
        property: client-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: cookie-secret
      remoteRef:
        key: {{ .Values.global.cluster_name }}-grafana-oauth-proxy
        property: cookie-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
{{- end }}
