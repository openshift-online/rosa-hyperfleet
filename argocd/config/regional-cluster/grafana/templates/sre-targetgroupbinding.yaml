{{- if .Values.grafana.sre.targetGroup.arn }}
apiVersion: elbv2.k8s.aws/v1beta1
kind: TargetGroupBinding
metadata:
  name: grafana-sre
  namespace: {{ .Release.Namespace }}
spec:
  serviceRef:
    name: grafana
    port: 80
  targetGroupARN: {{ .Values.grafana.sre.targetGroup.arn | quote }}
  targetType: ip
{{- end }}
