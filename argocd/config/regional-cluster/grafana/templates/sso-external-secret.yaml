{{- if .Values.grafana.sso.secretArn }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-sso
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: grafana-sso
    creationPolicy: Owner
  data:
    - secretKey: client-id
      remoteRef:
        key: {{ .Values.grafana.sso.secretArn }}
        property: client_id
    - secretKey: client-secret
      remoteRef:
        key: {{ .Values.grafana.sso.secretArn }}
        property: client_secret
    - secretKey: oidc-url
      remoteRef:
        key: {{ .Values.grafana.sso.secretArn }}
        property: oidc_url
{{- end }}
