apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "kas.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kas.labels" . | nindent 4 }}
spec:
  provider: aws
  parameters:
    # Enable Pod Identity authentication (no IRSA/OIDC needed)
    usePodIdentity: "true"
    region: {{ .Values.global.aws_region | required "aws_region must be set" }}
    objects: |
      # Database credentials for Kine PostgreSQL connection
      - objectName: "{{ .Values.global.cluster_name }}-kas-db-credentials"
        objectType: "secretsmanager"
        jmesPath:
          - path: "username"
            objectAlias: "db.user"
          - path: "password"
            objectAlias: "db.password"
          - path: "host"
            objectAlias: "db.host"
          - path: "port"
            objectAlias: "db.port"
          - path: "database"
            objectAlias: "db.name"
  secretObjects:
    - secretName: kas-db-credentials
      type: Opaque
      data:
        - objectName: db.user
          key: db.user
        - objectName: db.password
          key: db.password
        - objectName: db.host
          key: db.host
        - objectName: db.port
          key: db.port
        - objectName: db.name
          key: db.name
