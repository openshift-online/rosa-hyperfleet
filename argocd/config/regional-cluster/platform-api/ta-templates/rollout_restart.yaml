name: rollout_restart
profile: kube
scope: kube-api
type: write
description: Perform a rolling restart of a deployment
params:
  - name: namespace
    required: true
  - name: deployment_name
    required: true
manifests:
  - apiVersion: rbac.authorization.k8s.io/v1
    kind: Role
    metadata:
      name: zoa-rollout-restart-{{ .ExecID }}
      namespace: {{ index .Params "namespace" }}
      labels:
        zoa.rosa.io/execution-id: "{{ .ExecID }}"
        zoa.rosa.io/action: "{{ .ActionName }}"
        zoa.rosa.io/managed: "true"
    rules:
      - apiGroups: ["apps"]
        resources: ["deployments"]
        verbs: ["get", "patch"]
  - apiVersion: rbac.authorization.k8s.io/v1
    kind: RoleBinding
    metadata:
      name: zoa-rollout-restart-{{ .ExecID }}
      namespace: {{ index .Params "namespace" }}
      labels:
        zoa.rosa.io/execution-id: "{{ .ExecID }}"
        zoa.rosa.io/action: "{{ .ActionName }}"
        zoa.rosa.io/managed: "true"
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: Role
      name: zoa-rollout-restart-{{ .ExecID }}
    subjects:
      - kind: ServiceAccount
        name: zoa-kube-sa
        namespace: {{ .Namespace }}
  - apiVersion: batch/v1
    kind: Job
    metadata:
      name: zoa-{{ .ExecID }}
      namespace: {{ .Namespace }}
      labels:
        zoa.rosa.io/execution-id: "{{ .ExecID }}"
        zoa.rosa.io/action: "{{ .ActionName }}"
        zoa.rosa.io/profile: "kube"
        zoa.rosa.io/type: "write"
        zoa.rosa.io/managed: "true"
    spec:
      ttlSecondsAfterFinished: 3600
      backoffLimit: 0
      template:
        metadata:
          labels:
            zoa.rosa.io/execution-id: "{{ .ExecID }}"
            zoa.rosa.io/action: "{{ .ActionName }}"
            zoa.rosa.io/profile: "kube"
        spec:
          serviceAccountName: zoa-kube-sa
          restartPolicy: Never
          containers:
            - name: ta
              image: "{{ .Image }}"
              command: ["/bin/bash", "/zoa/entrypoint.sh"]
              env:
                - name: RUN_ID
                  value: "{{ .ExecID }}"
                - name: CLUSTER_ID
                  value: "{{ .TargetCluster }}"
                - name: ARTIFACT_BUCKET
                  value: "{{ .OutputBucket }}"
                - name: ACTION_NAME
                  value: "{{ .ActionName }}"
                - name: TARGET_NAMESPACE
                  value: "{{ index .Params "namespace" }}"
                - name: DEPLOYMENT_NAME
                  value: "{{ index .Params "deployment_name" }}"
              volumeMounts:
                - name: artifacts
                  mountPath: /artifacts
                - name: zoa-scripts
                  mountPath: /zoa
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: artifacts
              emptyDir: {}
            - name: zoa-scripts
              configMap:
                name: zoa-scripts-{{ .ExecID }}
                defaultMode: 0755
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: zoa-scripts-{{ .ExecID }}
      namespace: {{ .Namespace }}
      labels:
        zoa.rosa.io/execution-id: "{{ .ExecID }}"
        zoa.rosa.io/managed: "true"
    data:
      entrypoint.sh: |
        #!/bin/bash
        set -uo pipefail

        echo "[zoa] Starting execution: ${RUN_ID}"
        echo "[zoa] Action: ${ACTION_NAME}"
        echo "[zoa] Target: ${CLUSTER_ID}"
        echo "[zoa] Timestamp: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
        echo "---"

        /zoa/run.sh > /artifacts/stdout.log 2> /artifacts/stderr.log
        EXIT_CODE=$?

        echo "[zoa] Script exited with code: ${EXIT_CODE}"

        if [ -n "${ARTIFACT_BUCKET}" ]; then
          echo "[zoa] Uploading artifacts to s3://${ARTIFACT_BUCKET}/${RUN_ID}/"
          aws s3 cp /artifacts/stdout.log "s3://${ARTIFACT_BUCKET}/${RUN_ID}/stdout.log" --quiet 2>/dev/null || true
          aws s3 cp /artifacts/stderr.log "s3://${ARTIFACT_BUCKET}/${RUN_ID}/stderr.log" --quiet 2>/dev/null || true
          if [ -f /artifacts/output.json ]; then
            aws s3 cp /artifacts/output.json "s3://${ARTIFACT_BUCKET}/${RUN_ID}/output.json" --quiet 2>/dev/null || true
          fi
          echo "[zoa] Upload complete"
        fi

        exit $EXIT_CODE
      run.sh: |
        #!/bin/bash
        set -euo pipefail

        echo "Rolling restart deployment: ${DEPLOYMENT_NAME} in namespace: ${TARGET_NAMESPACE}"
        kubectl rollout restart deployment/${DEPLOYMENT_NAME} -n ${TARGET_NAMESPACE}

        echo "Waiting for rollout to complete..."
        kubectl rollout status deployment/${DEPLOYMENT_NAME} -n ${TARGET_NAMESPACE} --timeout=300s

        kubectl get deployment ${DEPLOYMENT_NAME} -n ${TARGET_NAMESPACE} -o json > /artifacts/output.json
        echo "Rollout restart completed successfully"
