{{- if .Values.monitoring.sre.targetGroup.arn }}
apiVersion: elbv2.k8s.aws/v1alpha1
kind: TargetGroupBinding
metadata:
  name: prometheus-sre
  namespace: {{ .Release.Namespace }}
spec:
  serviceRef:
    name: monitoring-prometheus
    port: 9090
  targetGroupARN: {{ .Values.monitoring.sre.targetGroup.arn | quote }}
  targetType: ip
{{- end }}
