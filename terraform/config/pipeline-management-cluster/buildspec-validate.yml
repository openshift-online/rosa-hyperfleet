version: 0.2

env:
  shell: bash

phases:
  install:
    commands:
      - echo "Installing dependencies..."
      - yum install -y unzip python3 jq gnupg2
      - pip3 install boto3 pyyaml
      - echo "Installing Terraform..."
      - |
        set -euo pipefail
        TF_VERSION="1.14.3"
        TF_PACKAGE="terraform_${TF_VERSION}_linux_amd64.zip"
        TF_BASE_URL="https://releases.hashicorp.com/terraform/${TF_VERSION}"

        # Download Terraform package and verification files
        echo "Downloading Terraform ${TF_VERSION}..."
        curl -sSfO "${TF_BASE_URL}/${TF_PACKAGE}"
        curl -sSfO "${TF_BASE_URL}/terraform_${TF_VERSION}_SHA256SUMS"
        curl -sSfO "${TF_BASE_URL}/terraform_${TF_VERSION}_SHA256SUMS.sig"

        # Import HashiCorp GPG key
        echo "Importing HashiCorp GPG key..."
        gpg --batch --keyserver keyserver.ubuntu.com --recv-keys \
          C874011F0AB405110D02105534365D9472D7468F || \
        gpg --batch --keyserver keys.openpgp.org --recv-keys \
          C874011F0AB405110D02105534365D9472D7468F || \
        gpg --batch --keyserver pgp.mit.edu --recv-keys \
          C874011F0AB405110D02105534365D9472D7468F

        # Verify GPG signature on SHA256SUMS
        echo "Verifying GPG signature..."
        if ! gpg --batch --verify "terraform_${TF_VERSION}_SHA256SUMS.sig" "terraform_${TF_VERSION}_SHA256SUMS"; then
          echo "❌ GPG signature verification failed"
          exit 1
        fi
        echo "✓ GPG signature verified"

        # Verify checksum of Terraform package
        echo "Verifying SHA256 checksum..."
        if ! grep "${TF_PACKAGE}" "terraform_${TF_VERSION}_SHA256SUMS" | sha256sum -c -; then
          echo "❌ Checksum verification failed"
          exit 1
        fi
        echo "✓ Checksum verified"

        # Install Terraform
        echo "Installing Terraform..."
        unzip -o "${TF_PACKAGE}" -d /tmp/tf-bin
        mv /tmp/tf-bin/terraform /usr/local/bin/

        # Cleanup
        rm -f "${TF_PACKAGE}" "terraform_${TF_VERSION}_SHA256SUMS" "terraform_${TF_VERSION}_SHA256SUMS.sig"

        terraform version
        echo "✓ Terraform installation verified"

  build:
    commands:
      - echo "Validating Management Cluster Configuration..."
      - |
        set -euo pipefail

        # Validate required environment variables
        if [[ -z "$TARGET_ACCOUNT_ID" || -z "$TARGET_REGION" || -z "$TARGET_ALIAS" ]]; then
            echo "❌ ERROR: Required environment variables not set"
            echo "   TARGET_ACCOUNT_ID: ${TARGET_ACCOUNT_ID}"
            echo "   TARGET_REGION: ${TARGET_REGION}"
            echo "   TARGET_ALIAS: ${TARGET_ALIAS}"
            exit 1
        fi

        echo "Configuration:"
        echo "  Target Account: $TARGET_ACCOUNT_ID"
        echo "  Target Region: $TARGET_REGION"
        echo "  Target Alias: $TARGET_ALIAS"
        echo ""

        # Validate environment variable formats
        if [[ ! "$TARGET_ACCOUNT_ID" =~ ^[0-9]{12}$ ]]; then
            echo "❌ ERROR: Invalid AWS Account ID format: $TARGET_ACCOUNT_ID" >&2
            echo "   Expected: 12-digit number" >&2
            exit 1
        fi

        if [[ ! "$TARGET_REGION" =~ ^[a-z]{2}-[a-z]+-[0-9]{1}$ ]]; then
            echo "⚠️  WARNING: TARGET_REGION may be invalid: $TARGET_REGION"
            echo "   Expected format: xx-xxxx-N (e.g., us-east-1, eu-west-2)"
        fi

        if [[ ! "$TARGET_ALIAS" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "❌ ERROR: Invalid alias format: $TARGET_ALIAS" >&2
            echo "   Expected: alphanumeric, hyphens, underscores only" >&2
            exit 1
        fi

        echo "✓ Environment variable format validation passed"
        echo ""

        # Get central account ID
        CENTRAL_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        echo "Central Account: ${CENTRAL_ACCOUNT_ID}"
        echo ""

        # Define role ARN
        ROLE_ARN="arn:aws:iam::${TARGET_ACCOUNT_ID}:role/OrganizationAccountAccessRole"

        echo "===================================================="
        echo "Pre-flight Check: Testing Assume Role"
        echo "===================================================="
        echo "Role ARN: $ROLE_ARN"

        # Test assume role capability
        if ! ASSUMED_CREDS=$(aws sts assume-role \
            --role-arn "$ROLE_ARN" \
            --role-session-name "pipeline-preflight-validation" \
            --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
            --output text 2>&1); then
            echo "❌ FAILED: Cannot assume role $ROLE_ARN"
            echo ""
            echo "Error details:"
            echo "$ASSUMED_CREDS"
            echo ""
            echo "Common causes:"
            echo "  • OrganizationAccountAccessRole does not exist in target account"
            echo "  • Trust policy does not allow central account to assume role"
            echo "  • CodeBuild role lacks sts:AssumeRole permission"
            echo ""
            exit 1
        fi

        # Temporarily assume role to verify
        export AWS_ACCESS_KEY_ID=$(echo $ASSUMED_CREDS | awk '{print $1}')
        export AWS_SECRET_ACCESS_KEY=$(echo $ASSUMED_CREDS | awk '{print $2}')
        export AWS_SESSION_TOKEN=$(echo $ASSUMED_CREDS | awk '{print $3}')

        if ! ASSUMED_IDENTITY=$(aws sts get-caller-identity --query 'Account' --output text 2>&1); then
            echo "❌ FAILED: Can assume role but cannot make API calls"
            echo "Error: $ASSUMED_IDENTITY"
            unset AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN
            exit 1
        fi

        if [ "$ASSUMED_IDENTITY" != "$TARGET_ACCOUNT_ID" ]; then
            echo "❌ FAILED: Assumed role in wrong account"
            echo "  Expected: $TARGET_ACCOUNT_ID"
            echo "  Got: $ASSUMED_IDENTITY"
            unset AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN
            exit 1
        fi

        echo "✅ Successfully assumed role in account $TARGET_ACCOUNT_ID"
        echo ""

        # Clean up - unset for Terraform to use provider assume_role config
        unset AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN

        echo "===================================================="
        echo "Terraform Validation"
        echo "===================================================="

        # Set Terraform backend config
        export TF_STATE_BUCKET="terraform-state-${CENTRAL_ACCOUNT_ID}"
        export TF_STATE_KEY="management-cluster/${TARGET_ALIAS}.tfstate"

        # Dynamically detect bucket region (uses central account creds)
        BUCKET_REGION=$(aws s3api get-bucket-location --bucket $TF_STATE_BUCKET --query LocationConstraint --output text)
        if [ "$BUCKET_REGION" == "None" ] || [ "$BUCKET_REGION" == "null" ] || [ -z "$BUCKET_REGION" ]; then BUCKET_REGION="us-east-1"; fi
        export TF_STATE_REGION=$BUCKET_REGION

        # Generate override.tf for cross-account access
        echo "Generating override.tf for validation..."
        echo 'provider "aws" {' > terraform/config/management-cluster/override.tf
        echo "  region = \"${TARGET_REGION}\"" >> terraform/config/management-cluster/override.tf
        echo '  assume_role {' >> terraform/config/management-cluster/override.tf
        echo "    role_arn = \"${ROLE_ARN}\"" >> terraform/config/management-cluster/override.tf
        echo '  }' >> terraform/config/management-cluster/override.tf
        echo '}' >> terraform/config/management-cluster/override.tf

        # Initialize Terraform
        echo "Initializing Terraform..."
        cd terraform/config/management-cluster
        terraform init -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${TF_STATE_REGION}" \
            -backend-config="use_lockfile=true"

        echo "Validating Terraform configuration..."
        terraform validate

        # Export required Terraform variables
        export TF_VAR_app_code="${APP_CODE}"
        export TF_VAR_service_phase="${SERVICE_PHASE}"
        export TF_VAR_cost_center="${COST_CENTER}"
        export TF_VAR_repository_url="${REPOSITORY_URL}"
        export TF_VAR_repository_branch="${REPOSITORY_BRANCH}"
        export TF_VAR_cluster_id="${CLUSTER_ID:-mgmt-cluster-01}"
        export TF_VAR_regional_aws_account_id="${REGIONAL_AWS_ACCOUNT_ID:-${CENTRAL_ACCOUNT_ID}}"

        echo "Running Terraform plan..."
        if ! terraform plan -out=tfplan; then
            echo "❌ Terraform plan failed"
            rm -f override.tf
            cd ../../..
            exit 1
        fi

        # Save plan summary
        terraform show -no-color tfplan > plan-summary.txt
        echo "✓ Plan summary saved to plan-summary.txt"

        # Cleanup
        rm -f override.tf

        cd ../../..

  post_build:
    commands:
      - echo "Validation complete."
      - |
        if [ -f terraform/config/management-cluster/plan-summary.txt ]; then
          echo "=== Terraform Plan Summary ==="
          cat terraform/config/management-cluster/plan-summary.txt
        fi

artifacts:
  files:
    - '**/*'
